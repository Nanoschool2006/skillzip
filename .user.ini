; cPanel-generated php ini directives, do not edit
; Manual editing of this file may result in unexpected behavior.
; To make changes to this file, use the cPanel MultiPHP INI Editor (Home >> Software >> MultiPHP INI Editor)
; For more information, read our documentation (https://go.cpanel.net/EA4ModifyINI)

; ------------------------------------------------------------
; Stable, growth-ready php.ini (EA-PHP 8.3 / cPanel)
; nanoschool.in — WP + heavy dev activity
; ------------------------------------------------------------

[PHP]
; --- Core behavior ---

; --- Error handling (no display on web; log to default cPanel log) ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE

; --- Timezone & encoding ---
date.timezone = "Asia/Kolkata"
default_charset = "UTF-8"

; --- Resource limits (web) ---
; Keep web snappy; long jobs -> wp cron via CLI workers
max_execution_time = 300
max_input_time = 120
memory_limit = 1024M
max_input_vars = 10000

; --- Uploads ---
upload_max_filesize = 512M
post_max_size = 512M

; --- Output & compression ---
zlib.output_compression = On
output_buffering = 4096

; --- Request parsing order ---
request_order = "GP"
variables_order = "GPCS"

; --- Filesystem perf ---

; --- PCRE ---

; --- Sockets / SMTP client behavior ---
default_socket_timeout = 20

; --- Sessions (stable, secure, long-lived logins) ---
session.save_handler = "files"
session.save_path = "/var/cpanel/php/sessions/ea-php83"
session.gc_maxlifetime = 28800
session.gc_probability = 1
session.gc_divisor = 1000
session.cookie_httponly = "1"
session.cookie_secure = "1           ; requires HTTPS (recommended)"
session.cookie_samesite = "Lax"
session.use_strict_mode = On
session.sid_length = 48
session.sid_bits_per_character = 6
session.use_cookies = On
session.use_only_cookies = On
session.use_trans_sid = Off
session.lazy_write = 1

; --- Security hardening ---
; If build/deploy tools or WP-CLI need shell access (e.g., ImageMagick),
; remove specific functions from this list cautiously.
; (exec,shell_exec left enabled for dev/CLI workflows; re-disable if not needed)

; --- CGI/FastCGI safety ---

; ------------------------------------------------------------
; OPcache (web + CLI workers)
; Target: ~3× headroom for codebase growth & frequent deploys
; ------------------------------------------------------------
[opcache]
; JIT typically hurts WP latency; keep off unless profiled otherwise
; Extra safety in multi-user envs (cPanel)
